<!DOCTYPE html>
<html lang="en">
<head>
    <title>TIDBIT – LOGIN</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="app.js" defer></script>
    <link rel="stylesheet" href="/style.css">
</head>

<body class="landing-body">
    <div class="container landing-shell">
        <section class="panel landing-panel">
            <p class="eyebrow">Wallet-Native Custody</p>
            <h1>TIDBIT-share-WEAVE</h1>
            <p class="hero-text">
                A zero-trust workspace for uploading, verifying, signing, and sharing files with cryptographic provenance.
            </p>
            <div class="landing-points">
                <span>Post-quantum aligned</span>
                <span>Signed custody events</span>
                <span>Supabase storage + Postgres index</span>
            </div>

            <div class="auth-login-row">
                <select id="walletProvider" aria-label="Wallet provider">
                    <option value="metamask">MetaMask</option>
                    <option value="phantom">Phantom</option>
                </select>
                <button id="login-wallet" class="button-primary">Login</button>
            </div>
            <div class="landing-links">
                <a href="/">Learn More</a>
                <a href="/pricing">Pricing</a>
            </div>
            <div id="status" class="muted"></div>
        </section>
    </div>
</body>
</html>
