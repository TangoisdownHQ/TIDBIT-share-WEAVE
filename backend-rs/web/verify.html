<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TIDBIT · Public Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Verify document integrity against TIDBIT-share-WEAVE public verification endpoints." />
  <meta name="theme-color" content="#09162b">
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="apple-touch-icon" href="/logo.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="stylesheet" href="/style.css">
  <script src="/vendor/sha3.js"></script>
</head>
<body>
  <div class="container">
    <h2>🔍 Verify Document Integrity</h2>

    <input type="file" id="verifyFile" />
    <button onclick="verifyFile()">Verify</button>

    <pre id="verifyResult" class="muted"></pre>
  </div>

  <script>
    const API = "http://127.0.0.1:4100";

    async function verifyFile() {
      const file = document.getElementById("verifyFile").files[0];
      if (!file) return alert("Pick a file");

      const form = new FormData();
      form.append("file", file);

      const resp = await fetch(`${API}/api/public/verify`, {
        method: "POST",
        body: form
      });

      const data = await resp.json();
      document.getElementById("verifyResult").innerText =
        JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
