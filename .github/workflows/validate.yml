name: Validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  rust:
    name: Rust Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-rs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend-rs

      - name: Cargo check
        run: cargo check

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Cargo audit
        run: cargo audit

  frontend:
    name: Frontend Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Check app.js syntax
        run: node --check backend-rs/web/app.js
